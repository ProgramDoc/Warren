# Render Blueprint — Warren Financial Dashboard
# Deploy: Connect GitHub repo, Render auto-detects this file

services:
  - type: web
    name: warren-dashboard
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warren-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: INIT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: warren-db
    plan: starter
    region: oregon
    postgresMajorVersion: "16"
