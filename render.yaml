# Render Blueprint — Warren Financial Dashboard
# Deploy: Connect GitHub repo, Render auto-detects this file

services:
  - type: web
    name: warren-dashboard
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warren-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: INIT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: HOUSEHOLD_EMAIL
        sync: false
      - key: HOUSEHOLD_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

databases:
  - name: warren-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
